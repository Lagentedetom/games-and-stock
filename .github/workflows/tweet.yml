name: Auto Tweet

on:
  schedule:
    # Monday-Friday: 09:00 CEST (07:00 UTC) — morning
    - cron: '0 7 * * 1-5'
    # Monday-Friday: 13:00 CEST (11:00 UTC) — midday (the BEST slot per weekly stats)
    - cron: '0 11 * * 1-5'
    # Monday-Friday: 15:00 CEST (13:00 UTC) — midday2 (added 2026-04-23 to amplify best slot)
    - cron: '0 13 * * 1-5'
    # Monday-Friday: 18:00 CEST (16:00 UTC) — evening
    - cron: '0 16 * * 1-5'
    # Saturday: 12:00 CEST (10:00 UTC)
    - cron: '0 10 * * 6'
    # Sunday: 17:00 CEST (15:00 UTC)
    - cron: '0 15 * * 0'
    # Friday: 20:00 CEST (18:00 UTC) — Weekly summary
    - cron: '0 18 * * 5'
  workflow_dispatch:
    inputs:
      slot:
        description: 'Time slot'
        required: true
        default: 'morning'
        type: choice
        options:
          - morning
          - midday
          - midday2
          - evening
          - weekend
      test_mode:
        description: 'Test mode (do not publish)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  tweet:
    runs-on: ubuntu-latest
    env:
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install chart dependencies
        run: pip install yfinance mplfinance matplotlib

      - name: Determine time slot
        id: slot
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            DOW=$(date -u +%u)
            # Slot mapping (UTC):
            #   07 UTC → morning (09:00 CEST)
            #   11 UTC → midday  (13:00 CEST)
            #   13 UTC → midday2 (15:00 CEST) — added 2026-04-23
            #   16 UTC → evening (18:00 CEST)
            if [ "$DOW" -ge 6 ]; then
              echo "slot=weekend" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 8 ]; then
              echo "slot=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 12 ]; then
              echo "slot=midday" >> $GITHUB_OUTPUT
            elif [ "$HOUR" -le 14 ]; then
              echo "slot=midday2" >> $GITHUB_OUTPUT
            else
              echo "slot=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Check if weekly summary
        id: check_summary
        run: |
          HOUR=$(date -u +%H)
          DOW=$(date -u +%u)
          if [ "$DOW" = "5" ] && [ "$HOUR" -ge 17 ]; then
            echo "is_summary=true" >> $GITHUB_OUTPUT
          else
            echo "is_summary=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate and publish tweet
        if: steps.check_summary.outputs.is_summary == 'false'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.test_mode }}" = "true" ]; then
            python scripts/tweet.py --slot ${{ steps.slot.outputs.slot }} --test
          else
            python scripts/tweet.py --slot ${{ steps.slot.outputs.slot }}
          fi

      - name: Generate and publish weekly summary
        if: steps.check_summary.outputs.is_summary == 'true'
        run: python scripts/weekly_summary.py

      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Add each path independently so a missing dir doesn't block the other
          git add data/tweets_log.csv || true
          git add data/weekly_summaries/ || true
          git diff --cached --quiet || git commit -m "Log tweet $(date -u +%Y-%m-%d_%H:%M)"
          git push
